[project]
name = "poker-engine"
version = "0.1.0"
description = "Texas Hold'em Poker Game Engine"
requires-python = ">=3.9"
dependencies = [
    "treys>=0.1.8",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
]

[build-system]
requires = ["setuptools>=65.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]
